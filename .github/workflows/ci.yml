name: ci

# Production gate for a script repo: shell syntax (bash -n), shellcheck for real
# errors, and Python syntax compilation.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: shell + python lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: bash syntax (bash -n)
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r -d '' f; do
            bash -n "$f" || { echo "::error file=$f::bash syntax error"; fail=1; }
          done < <(find . -name '*.sh' -not -path './.git/*' -print0)
          exit $fail
      - name: shellcheck (errors)
        run: |
          set -euo pipefail
          mapfile -d '' files < <(find . -name '*.sh' -not -path './.git/*' -print0)
          [ ${#files[@]} -eq 0 ] || shellcheck --severity=error "${files[@]}"
      - name: python syntax (py_compile)
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            python3 -m py_compile "$f" || { echo "::error file=$f::python syntax error"; exit 1; }
          done < <(find . -name '*.py' -not -path './.git/*' -print0)
